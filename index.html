<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jet vs Alien – Stable Mobile</title>

<style>

body{
background:black;
color:#00ffff;
text-align:center;
font-family:Arial;
margin:0;
overflow:hidden;
}

canvas{
border:2px solid #00ffff;
background:black;
display:block;
margin:10px auto;
max-width:95%;
}

#mobileControls{
position:fixed;
bottom:70px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
}

.control{
width:75px;
height:75px;
border-radius:50%;
border:3px solid #00ffff;
background:rgba(0,0,0,0.8);
color:#00ffff;
font-size:26px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 12px #00ffff;
touch-action:none;
}

.fire{
border-color:red;
color:red;
box-shadow:0 0 15px red;
}

.moveControls{
display:flex;
gap:15px;
}

@media(min-width:900px){
#mobileControls{display:none;}
}

</style>
</head>

<body>

<h2>JET vs ALIEN</h2>
Score: <span id="score">0</span> |
Level: <span id="level">1</span>

<canvas id="gameCanvas" width="800" height="450"></canvas>

<div id="mobileControls">
<button id="fireBtn" class="control fire">🔥</button>
<div class="moveControls">
<button id="leftBtn" class="control">⬅</button>
<button id="rightBtn" class="control">➡</button>
</div>
</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

// ===== GAME STATE =====
let score=0;
let level=1;
let alienSpeed=0.6;
let paused=false;
let gameOver=false;

const jet={x:380,y:400,width:40,height:40,speed:5};
let bullets=[];
let aliens=[];
let keys={};

// ===== AUDIO =====
let audioCtx=null;
function initAudio(){
if(!audioCtx)
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==="suspended")
audioCtx.resume();
}

function shootSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.value=600;
gain.gain.value=0.3;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.1);
}

function explosionSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.value=150;
gain.gain.value=0.5;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.4);
}

// ===== KEYBOARD =====
document.addEventListener("keydown",(e)=>{
keys[e.key]=true;
if((e.key==="f"||e.key==="F")&&!paused&&!gameOver){
bullets.push({x:jet.x+18,y:jet.y});
shootSound();
}
});

document.addEventListener("keyup",(e)=>{
keys[e.key]=false;
});

// ===== MOBILE BUTTONS FIXED =====
function addHoldControl(button,keyName){
button.addEventListener("touchstart",(e)=>{
e.preventDefault();
keys[keyName]=true;
});

button.addEventListener("touchend",(e)=>{
e.preventDefault();
keys[keyName]=false;
});

button.addEventListener("touchcancel",(e)=>{
e.preventDefault();
keys[keyName]=false;
});
}

addHoldControl(document.getElementById("leftBtn"),"ArrowLeft");
addHoldControl(document.getElementById("rightBtn"),"ArrowRight");

document.getElementById("fireBtn").addEventListener("touchstart",(e)=>{
e.preventDefault();
if(!paused&&!gameOver){
bullets.push({x:jet.x+18,y:jet.y});
shootSound();
}
});

// ===== GAME LOOP =====
let lastSpawn=0;

function spawnAlien(time){
if(time-lastSpawn>1500){
aliens.push({x:Math.random()*(canvas.width-40),y:-40,size:40});
lastSpawn=time;
}
}

function collision(a){
return(
jet.x<a.x+a.size &&
jet.x+jet.width>a.x &&
jet.y<a.y+a.size &&
jet.y+jet.height>a.y
);
}

function update(time){

if(paused||gameOver)return;

spawnAlien(time);

if(keys["ArrowLeft"])jet.x-=jet.speed;
if(keys["ArrowRight"])jet.x+=jet.speed;

if(jet.x<0)jet.x=0;
if(jet.x>canvas.width-jet.width)jet.x=canvas.width-jet.width;

for(let i=aliens.length-1;i>=0;i--){
aliens[i].y+=alienSpeed;

if(collision(aliens[i])){
gameOver=true;
explosionSound();
alert("CAPTURED!");
}
}

for(let i=aliens.length-1;i>=0;i--){
for(let j=bullets.length-1;j>=0;j--){
if(
bullets[j].x<aliens[i].x+40 &&
bullets[j].x+4>aliens[i].x &&
bullets[j].y<aliens[i].y+40 &&
bullets[j].y+10>aliens[i].y
){
aliens.splice(i,1);
bullets.splice(j,1);
score++;
document.getElementById("score").innerText=score;
break;
}
}
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffff";
ctx.beginPath();
ctx.moveTo(jet.x+20,jet.y);
ctx.lineTo(jet.x,jet.y+40);
ctx.lineTo(jet.x+40,jet.y+40);
ctx.fill();

ctx.fillStyle="yellow";
bullets.forEach(b=>{
b.y-=8;
ctx.fillRect(b.x,b.y,4,10);
});

ctx.fillStyle="red";
aliens.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x+20,a.y+20,20,0,Math.PI*2);
ctx.fill();
});
}

function loop(time){
update(time);
draw();
requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>
