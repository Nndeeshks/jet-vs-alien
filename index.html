<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jet vs Alien – Full Stable Version</title>

<style>

body{
background:black;
color:#00ffff;
text-align:center;
font-family:Arial;
margin:0;
overflow:hidden;
-webkit-user-select:none;
user-select:none;
-webkit-touch-callout:none;
}

canvas{
border:2px solid #00ffff;
background:black;
display:block;
margin:10px auto;
width:95%;
max-width:800px;
height:400px;
}

button,input{
padding:6px;
margin:5px;
font-size:14px;
background:black;
color:#00ffff;
border:1px solid #00ffff;
}

/* MESSAGE */
#message{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0.2);
font-size:48px;
font-weight:bold;
display:none;
color:orange;
text-shadow:0 0 10px red,0 0 20px orange,0 0 40px yellow;
}

.zoom{
animation:zoomOut 1s ease forwards;
}

@keyframes zoomOut{
0%{transform:translate(-50%,-50%) scale(0.2);opacity:0;}
50%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}
100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* MOBILE CONTROLS */
#mobileControls{
position:fixed;
bottom:70px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

.control{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #00ffff;
background:rgba(0,0,0,0.85);
color:#00ffff;
font-size:26px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 12px #00ffff;
touch-action:none;
}

.fire{
border-color:red;
color:red;
box-shadow:0 0 15px red;
}

.moveControls{
display:flex;
gap:20px;
}

@media(min-width:900px){
#mobileControls{display:none;}
}

</style>
</head>

<body>

<h2>JET vs ALIEN</h2>

Player:
<input id="playerName" value="Player1">

<button onclick="pauseGame()">PAUSE</button>
<button onclick="resetGame()">PLAY AGAIN</button>

<br>
Score: <span id="score">0</span> |
Level: <span id="level">1</span>

<div id="message"></div>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<div id="mobileControls">
<button id="fireBtn" class="control fire">🔥</button>
<div class="moveControls">
<button id="leftBtn" class="control">⬅</button>
<button id="rightBtn" class="control">➡</button>
</div>
</div>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let score=0;
let level=1;
let alienSpeed=0.6;
let paused=false;
let gameOver=false;
let burnFrame=0;

const jet={x:380,y:330,width:40,height:40,speed:5};

let bullets=[];
let aliens=[];
let keys={};

// AUDIO
let audioCtx=null;
function initAudio(){
if(!audioCtx)
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==="suspended")
audioCtx.resume();
}

function shootSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.value=700;
gain.gain.value=0.3;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.1);
}

function explosionSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.value=150;
gain.gain.value=0.5;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.4);
}

// MESSAGE
function showMessage(text,color="orange"){
const msg=document.getElementById("message");
msg.innerText=text;
msg.style.color=color;
msg.style.display="block";
msg.classList.remove("zoom");
void msg.offsetWidth;
msg.classList.add("zoom");
setTimeout(()=>msg.style.display="none",1000);
}

// CONTROLS
document.addEventListener("keydown",(e)=>{
keys[e.key]=true;
if((e.key==="f"||e.key==="F")&&!paused&&!gameOver){
bullets.push({x:jet.x+18,y:jet.y});
shootSound();
}
});
document.addEventListener("keyup",(e)=>keys[e.key]=false);

// MOBILE
function addButton(btn,key){
btn.addEventListener("touchstart",(e)=>{
e.preventDefault();
keys[key]=true;
},{passive:false});

btn.addEventListener("touchend",(e)=>{
e.preventDefault();
keys[key]=false;
},{passive:false});
}

addButton(document.getElementById("leftBtn"),"ArrowLeft");
addButton(document.getElementById("rightBtn"),"ArrowRight");

document.getElementById("fireBtn").addEventListener("touchstart",(e)=>{
e.preventDefault();
if(!paused&&!gameOver){
bullets.push({x:jet.x+18,y:jet.y});
shootSound();
}
},{passive:false});

// GAME FUNCTIONS
function pauseGame(){
if(!gameOver)
paused=!paused;
}

function resetGame(){
score=0;
level=1;
alienSpeed=0.6;
bullets=[];
aliens=[];
jet.x=380;
paused=false;
gameOver=false;
burnFrame=0;
updateUI();
showMessage("LEVEL 1","#00ff00");
}

function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("level").innerText=level;
}

// SPAWN
let lastSpawn=0;
function spawnAlien(time){
if(time-lastSpawn>1500&&!gameOver){
aliens.push({x:Math.random()*(canvas.width-40),y:-40,size:40});
lastSpawn=time;
}
}

// COLLISION
function collision(a){
return(
jet.x<a.x+a.size &&
jet.x+jet.width>a.x &&
jet.y<a.y+a.size &&
jet.y+jet.height>a.y
);
}

// UPDATE
function update(time){
if(paused)return;

spawnAlien(time);

if(!gameOver){
if(keys["ArrowLeft"])jet.x-=jet.speed;
if(keys["ArrowRight"])jet.x+=jet.speed;

if(jet.x<0)jet.x=0;
if(jet.x>canvas.width-jet.width)jet.x=canvas.width-jet.width;
}

for(let i=aliens.length-1;i>=0;i--){
aliens[i].y+=alienSpeed;

if(!gameOver&&collision(aliens[i])){
gameOver=true;
paused=true;
explosionSound();
showMessage("CAPTURED","red");
}
}

for(let i=aliens.length-1;i>=0;i--){
for(let j=bullets.length-1;j>=0;j--){
if(
bullets[j].x<aliens[i].x+40 &&
bullets[j].x+4>aliens[i].x &&
bullets[j].y<aliens[i].y+40 &&
bullets[j].y+10>aliens[i].y
){
aliens.splice(i,1);
bullets.splice(j,1);
score++;
if(score%10===0){
level++;
alienSpeed+=0.3;
showMessage("LEVEL "+level,"#00ff00");
}
updateUI();
break;
}
}
}

if(gameOver)burnFrame++;
}

// DRAW
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=gameOver?"red":"#00ffff";
ctx.beginPath();
ctx.moveTo(jet.x+20,jet.y);
ctx.lineTo(jet.x,jet.y+40);
ctx.lineTo(jet.x+40,jet.y+40);
ctx.fill();

// engine fire
if(!gameOver){
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(jet.x+20,jet.y+40,5+Math.random()*3,0,Math.PI*2);
ctx.fill();
}

// burn animation
if(gameOver){
for(let i=0;i<burnFrame%20;i++){
ctx.fillStyle=["red","orange","yellow"][Math.floor(Math.random()*3)];
ctx.beginPath();
ctx.arc(jet.x+Math.random()*40,jet.y+Math.random()*40,Math.random()*6,0,Math.PI*2);
ctx.fill();
}
}

ctx.fillStyle="yellow";
bullets.forEach(b=>{
b.y-=8;
ctx.fillRect(b.x,b.y,4,10);
});

ctx.fillStyle="red";
aliens.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x+20,a.y+20,20,0,Math.PI*2);
ctx.fill();
});
}

function loop(time){
update(time);
draw();
requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);

</script>

</body>
</html>
