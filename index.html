<!DOCTYPE html>
<html>
<head>
<title>Jet vs Alien – Mobile + Desktop Final</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:black;
color:#00ffff;
text-align:center;
font-family:Arial;
margin:0;
overflow:hidden;
}

canvas{
border:2px solid #00ffff;
background:black;
display:block;
margin:10px auto;
}

button,input{
padding:6px;
margin:5px;
font-size:14px;
background:black;
color:#00ffff;
border:1px solid #00ffff;
}

#message{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0.2);
font-size:48px;
font-weight:bold;
display:none;
color:orange;
text-shadow:
0 0 10px red,
0 0 20px orange,
0 0 40px yellow;
}

.zoom{
animation:zoomOut 1s ease forwards;
}

@keyframes zoomOut{
0%{transform:translate(-50%,-50%) scale(0.2);opacity:0;}
50%{transform:translate(-50%,-50%) scale(1.5);opacity:1;}
100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* MOBILE CONTROLS */
#mobileControls{
position:fixed;
bottom:20px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:0 30px;
pointer-events:auto;
}

.control{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #00ffff;
background:black;
color:#00ffff;
font-size:28px;
}

.fire{
border-color:red;
color:red;
}

.moveControls{
display:flex;
gap:15px;
}

@media (min-width: 900px){
#mobileControls{
display:none;
}
}

</style>
</head>

<body>

<h2>JET vs ALIEN</h2>

Score: <span id="score">0</span> |
Level: <span id="level">1</span>

<button onclick="pauseGame()">PAUSE</button>
<button onclick="resetGame()">PLAY AGAIN</button>

<div id="message"></div>

<canvas id="gameCanvas" width="800" height="450"></canvas>

<!-- MOBILE BUTTONS -->
<div id="mobileControls">

<button id="fireBtn" class="control fire">🔥</button>

<div class="moveControls">
<button id="leftBtn" class="control">⬅</button>
<button id="rightBtn" class="control">➡</button>
</div>

</div>

<script>

window.onload=function(){

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

// AUDIO
let audioCtx=null;
function initAudio(){
if(!audioCtx)
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(audioCtx.state==="suspended")
audioCtx.resume();
}

function shootSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.setValueAtTime(700,audioCtx.currentTime);
gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.1);
}

function explosionSound(){
initAudio();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.frequency.setValueAtTime(150,audioCtx.currentTime);
gain.gain.setValueAtTime(0.5,audioCtx.currentTime);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.4);
}

// GAME STATE
let paused=false;
let gameOver=false;
let score=0;
let level=1;
let alienSpeed=0.6;
let burnFrame=0;

const jet={
x:380,
y:400,
width:40,
height:40,
speed:5
};

let bullets=[];
let aliens=[];
let keys={};

// KEYBOARD
document.addEventListener("keydown",(e)=>{
if(gameOver)return;
keys[e.key]=true;
if((e.key==="f"||e.key==="F")&&!paused){
bullets.push({x:jet.x+18,y:jet.y,speed:8});
shootSound();
}
});
document.addEventListener("keyup",(e)=>keys[e.key]=false);

// MOBILE
const fireBtn=document.getElementById("fireBtn");
const leftBtn=document.getElementById("leftBtn");
const rightBtn=document.getElementById("rightBtn");

fireBtn.addEventListener("touchstart",()=>{
if(!paused&&!gameOver){
bullets.push({x:jet.x+18,y:jet.y,speed:8});
shootSound();
}
});

leftBtn.addEventListener("touchstart",()=>keys["ArrowLeft"]=true);
leftBtn.addEventListener("touchend",()=>keys["ArrowLeft"]=false);

rightBtn.addEventListener("touchstart",()=>keys["ArrowRight"]=true);
rightBtn.addEventListener("touchend",()=>keys["ArrowRight"]=false);

// UI
function showMessage(text,color="orange"){
const msg=document.getElementById("message");
msg.innerText=text;
msg.style.color=color;
msg.style.display="block";
msg.classList.remove("zoom");
void msg.offsetWidth;
msg.classList.add("zoom");
setTimeout(()=>msg.style.display="none",1000);
}

function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("level").innerText=level;
}

window.pauseGame=function(){
if(gameOver)return;
paused=!paused;
};

window.resetGame=function(){
score=0;
level=1;
alienSpeed=0.6;
bullets=[];
aliens=[];
jet.x=380;
paused=false;
gameOver=false;
burnFrame=0;
updateUI();
showMessage("LEVEL 1","#00ff00");
};

// SPAWN
let lastSpawn=0;
function spawnAlien(time){
if(gameOver)return;
if(time-lastSpawn>1500){
aliens.push({x:Math.random()*(canvas.width-40),y:-40,size:40});
lastSpawn=time;
}
}

// COLLISION
function collision(a){
return(
jet.x<a.x+a.size &&
jet.x+jet.width>a.x &&
jet.y<a.y+a.size &&
jet.y+jet.height>a.y
);
}

// UPDATE
function update(time){
if(paused)return;
spawnAlien(time);

if(!gameOver){
if(keys["ArrowLeft"])jet.x-=jet.speed;
if(keys["ArrowRight"])jet.x+=jet.speed;
if(jet.x<0)jet.x=0;
if(jet.x>canvas.width-jet.width)jet.x=canvas.width-jet.width;
}

for(let i=aliens.length-1;i>=0;i--){
aliens[i].y+=alienSpeed;
if(!gameOver&&collision(aliens[i])){
gameOver=true;
paused=true;
explosionSound();
showMessage("CAPTURED","red");
}
}

for(let i=aliens.length-1;i>=0;i--){
for(let j=bullets.length-1;j>=0;j--){
if(
bullets[j].x<aliens[i].x+40 &&
bullets[j].x+4>aliens[i].x &&
bullets[j].y<aliens[i].y+40 &&
bullets[j].y+10>aliens[i].y
){
aliens.splice(i,1);
bullets.splice(j,1);
score++;
if(score%10===0){
level++;
alienSpeed+=0.3;
showMessage("LEVEL "+level,"#00ff00");
}
updateUI();
break;
}
}
}

if(gameOver)burnFrame++;
}

// DRAW
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=gameOver?"red":"#00ffff";
ctx.beginPath();
ctx.moveTo(jet.x+20,jet.y);
ctx.lineTo(jet.x,jet.y+40);
ctx.lineTo(jet.x+40,jet.y+40);
ctx.fill();

if(!gameOver){
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(jet.x+20,jet.y+40,6,0,Math.PI*2);
ctx.fill();
}

if(gameOver){
for(let i=0;i<burnFrame%25;i++){
ctx.fillStyle=["red","orange","yellow"][Math.floor(Math.random()*3)];
ctx.beginPath();
ctx.arc(jet.x+Math.random()*40,jet.y+Math.random()*40,Math.random()*6,0,Math.PI*2);
ctx.fill();
}
}

ctx.fillStyle="yellow";
bullets.forEach(b=>{
b.y-=b.speed;
ctx.fillRect(b.x,b.y,4,10);
});

ctx.fillStyle="red";
aliens.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x+20,a.y+20,20,0,Math.PI*2);
ctx.fill();
});
}

function loop(time){
update(time);
draw();
requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);

};

</script>

</body>
</html>
